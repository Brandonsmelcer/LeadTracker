name: lead_tracker
description: "Vision To Legacy - Lead Tracker"
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  file_picker: ^8.0.0
  csv: ^6.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  path_drawing: ^1.0.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  android: false
  image_path: assets/images/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/maps/county_paths.json
    - assets/images/logo.png